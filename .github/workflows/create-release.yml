# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  push:
    branches:
      - 'main' 

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: pyproject
        run: |
          VERSION=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qE '-beta$'; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "Will publish as prerelease"
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "Will publish as full release"
          fi
          echo "Version: $VERSION"


      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.pyproject.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version already released"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Found new version"
          fi

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.pyproject.outputs.version }}"
          generate_release_notes: true
          prerelease: ${{ steps.pyproject.outputs.is_beta == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
