name: Generate Types

on:
  push:
    branches:
      - '**' 

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone Komodo source
        run: ./scripts/clone.sh

      - name: Generate client types
        run: ./scripts/generate.sh

      - name: Create pull request for generated komodo_api changes
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate komodo_api types"
          title: "chore: regenerate komodo_api types"
          body: |
            Automated update generated by the `generate-types` workflow.

            This PR includes only changes under `komodo_api`.
          branch: "automation/generate-komodo-api"
          delete-branch: true
          add-paths: |
            komodo_api/**
